<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>1942 – Pacific Ace</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
}
#hint {
  color: #556;
  font-size: 11px;
  margin-bottom: 6px;
  letter-spacing: 1px;
}
canvas {
  display: block;
  border: 2px solid #1a3a5c;
  box-shadow: 0 0 40px rgba(0,80,200,0.4);
}
</style>
</head>
<body>
<div id="hint">ARROWS / WASD · SPACE · Z = Roll Left · X = Roll Right · ESC = Pause</div>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 420, H = 620;
canvas.width  = W;
canvas.height = H;

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let AC;
function initAC() { AC = new (window.AudioContext || window.webkitAudioContext)(); }

function tone(freq, type, dur, vol = 0.25, fStart = null) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type;
  const t = AC.currentTime;
  o.frequency.setValueAtTime(fStart || freq, t);
  if (fStart) o.frequency.exponentialRampToValueAtTime(freq, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur);
}

function noise(dur, vol = 0.25) {
  if (!AC) return;
  const sr = AC.sampleRate, n = Math.ceil(sr * dur);
  const buf = AC.createBuffer(1, n, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(), g = AC.createGain();
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.buffer = buf;
  src.connect(g); g.connect(AC.destination);
  src.start();
}

const SFX = {
  shoot:      () => tone(900, 'square', 0.055, 0.08),
  hit:        () => { noise(0.08, 0.2); tone(180, 'sawtooth', 0.08, 0.15, 380); },
  boom:       () => { noise(0.35, 0.45); tone(90,  'sawtooth', 0.25, 0.25, 280); },
  bigBoom:    () => { noise(0.75, 0.8);  tone(55,  'sawtooth', 0.55, 0.45, 200); },
  enemyShoot: () => tone(220, 'sawtooth', 0.07, 0.07),
  powerup:    () => { [440,660,880].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.15,0.3),i*100)); },
  death:      () => { noise(0.9, 0.9); tone(75, 'sawtooth', 0.7, 0.4, 280); },
  levelUp:    () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.18,0.35),i*140)); },
};

// ─── INPUT ──────────────────────────────────────────────────────────────────
const keys = {}, jp = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) jp[e.code] = true;
  keys[e.code] = true;
  if (!AC) initAC();
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (STATE === 'menu'     && e.code === 'Space') startGame();
  if (STATE === 'gameover' && e.code === 'Space') startGame();
  if (STATE === 'playing'  && e.code === 'Escape') STATE = 'paused';
  else if (STATE === 'paused' && e.code === 'Escape') STATE = 'playing';
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
function clearJP() { for (const k in jp) delete jp[k]; }

// ─── GAME VARS ───────────────────────────────────────────────────────────────
let STATE = 'menu';
let score, hiScore = +localStorage.getItem('1942hi') || 0;
let lives, level, frame;
let playerBullets, enemyBullets, enemies, powerups, particles;
let bossObj = null;
let waveTimer, waveNum, waveSpawned;

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
let bgY = 0;
const islands = [];
function genIslands() {
  islands.length = 0;
  for (let i = 0; i < 24; i++) {
    islands.push({
      x: Math.random() * W,
      y: Math.random() * H * 4,
      rx: 20 + Math.random() * 55,
      ry: 12 + Math.random() * 30,
      hue: 100 + Math.random() * 50,
      lit: 22 + Math.random() * 14,
    });
  }
}

function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#00102a');
  g.addColorStop(1, '#001f55');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // wave lines
  ctx.strokeStyle = 'rgba(30,120,220,0.18)';
  ctx.lineWidth = 1;
  for (let y = (-(bgY % 44) + 44) % 44; y < H + 44; y += 44) {
    ctx.beginPath();
    for (let x = 0; x <= W; x += 18) {
      const wy = y + Math.sin((x * 0.06) + bgY * 0.04) * 3;
      x === 0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  // islands
  const scrollFrac = 0.45;
  islands.forEach(isl => {
    const iy = ((isl.y - bgY * scrollFrac) % (H * 4) + H * 4) % (H * 4) - 60;
    if (iy > H + 60) return;
    ctx.fillStyle = `hsl(${isl.hue},42%,${isl.lit}%)`;
    ctx.beginPath();
    ctx.ellipse(isl.x, iy, isl.rx, isl.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsl(45,50%,${isl.lit + 8}%)`;
    ctx.beginPath();
    ctx.ellipse(isl.x, iy + isl.ry * 0.2, isl.rx * 0.7, isl.ry * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function explode(x, y, n, big = false) {
  const cols = big
    ? ['#ff3300','#ff7700','#ffcc00','#ffffff','#ff5500']
    : ['#ff6600','#ffaa00','#ffee00'];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (big ? 2.5 : 1) + Math.random() * (big ? 5 : 2.5);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      dec: 0.018 + Math.random() * 0.035,
      r: (big ? 3 : 1.5) + Math.random() * (big ? 5 : 2.5),
      col: cols[Math.floor(Math.random() * cols.length)],
    });
  }
}

function tickParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.06;
    p.life -= p.dec; p.r *= 0.97;
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── DRAW: PLANES ────────────────────────────────────────────────────────────
function drawPlayer(x, y, rollAngle = 0) {
  ctx.save();
  ctx.translate(x, y);
  if (rollAngle) ctx.scale(Math.cos(rollAngle), 1);

  // Engine flame
  const fh = 8 + Math.random() * 7;
  ctx.fillStyle = '#ff5500';
  ctx.beginPath(); ctx.moveTo(-4,22); ctx.lineTo(4,22); ctx.lineTo(0,22+fh); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffee00';
  ctx.beginPath(); ctx.moveTo(-2,22); ctx.lineTo(2,22); ctx.lineTo(0,22+fh*0.55); ctx.closePath(); ctx.fill();

  // Tail booms
  ctx.fillStyle = '#1d4ea0';
  ctx.fillRect(-19, 6, 8, 17);
  ctx.fillRect(11, 6, 8, 17);

  // Horizontal stabiliser
  ctx.fillStyle = '#2a5cbf';
  ctx.beginPath();
  ctx.moveTo(-23,13); ctx.lineTo(23,13); ctx.lineTo(19,21); ctx.lineTo(-19,21);
  ctx.closePath(); ctx.fill();

  // Main wings
  ctx.fillStyle = '#2a5cbf';
  [[-1,-1],[1,1]].forEach(([sx])=> {
    ctx.save(); ctx.scale(sx,1);
    ctx.beginPath();
    ctx.moveTo(7,-4); ctx.lineTo(30,9); ctx.lineTo(24,16); ctx.lineTo(5,6);
    ctx.closePath(); ctx.fill();
    // Wing gun
    ctx.fillStyle = '#777';
    ctx.fillRect(24, 8, 7, 2);
    ctx.restore();
  });

  // Fuselage
  ctx.fillStyle = '#3366cc';
  ctx.beginPath();
  ctx.moveTo(0,-23); ctx.lineTo(7,-4); ctx.lineTo(7,20); ctx.lineTo(-7,20); ctx.lineTo(-7,-4);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.ellipse(0,-8,5,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5599cc';
  ctx.beginPath(); ctx.ellipse(0,-8,3,6,0,0,Math.PI*2); ctx.fill();

  // Nose spinner
  ctx.fillStyle = '#ff3300';
  ctx.beginPath(); ctx.moveTo(-3,-21); ctx.lineTo(3,-21); ctx.lineTo(0,-28); ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawFighter(x, y, col) {
  ctx.save(); ctx.translate(x, y);

  // Wings
  ctx.fillStyle = col;
  [[-1,1],[1,1]].forEach(([sx]) => {
    ctx.save(); ctx.scale(sx,1);
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.lineTo(27,6); ctx.lineTo(22,17); ctx.lineTo(4,10);
    ctx.closePath(); ctx.fill(); ctx.restore();
  });

  // Fuselage
  ctx.beginPath();
  ctx.moveTo(0,-22); ctx.lineTo(6,0); ctx.lineTo(6,20); ctx.lineTo(-6,20); ctx.lineTo(-6,0);
  ctx.closePath(); ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(-12,17); ctx.lineTo(12,17); ctx.lineTo(9,26); ctx.lineTo(-9,26); ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#cc6644';
  ctx.beginPath(); ctx.ellipse(0,0,6,9,0,0,Math.PI*2); ctx.fill();

  // Roundel
  ctx.fillStyle = '#dd0000';
  ctx.beginPath(); ctx.arc(0,6,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,6,2.5,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawBomber(x, y) {
  ctx.save(); ctx.translate(x, y);

  // Wings
  ctx.fillStyle = '#336633';
  [[-1],[1]].forEach(([sx]) => {
    ctx.save(); ctx.scale(sx,1);
    ctx.beginPath();
    ctx.moveTo(-5,8); ctx.lineTo(44,18); ctx.lineTo(40,30); ctx.lineTo(-5,20);
    ctx.closePath(); ctx.fill(); ctx.restore();
  });

  // Fuselage
  ctx.fillStyle = '#447744';
  ctx.beginPath();
  ctx.moveTo(0,-32); ctx.lineTo(12,0); ctx.lineTo(10,32); ctx.lineTo(-10,32); ctx.lineTo(-12,0);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#6688aa';
  ctx.beginPath(); ctx.ellipse(0,-14,8,12,0,0,Math.PI*2); ctx.fill();

  // Bomb bay
  ctx.fillStyle = '#222';
  ctx.fillRect(-7,10,14,14);

  ctx.restore();
}

function drawBossPlane(x, y, hp, maxHp) {
  ctx.save(); ctx.translate(x, y);

  // Engines (x4)
  [-62,-32,32,62].forEach(ex => {
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.arc(ex,14,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff4400';
    const fh = 8+Math.random()*8;
    ctx.beginPath(); ctx.moveTo(ex-4,23); ctx.lineTo(ex+4,23); ctx.lineTo(ex,23+fh); ctx.closePath(); ctx.fill();
  });

  // Wings
  ctx.fillStyle = '#553300';
  [[-1],[1]].forEach(([sx]) => {
    ctx.save(); ctx.scale(sx,1);
    ctx.beginPath();
    ctx.moveTo(-12,-8); ctx.lineTo(88,12); ctx.lineTo(78,38); ctx.lineTo(-10,22);
    ctx.closePath(); ctx.fill(); ctx.restore();
  });

  // Body
  ctx.fillStyle = '#664400';
  ctx.beginPath();
  ctx.moveTo(0,-65); ctx.lineTo(22,-20); ctx.lineTo(20,55); ctx.lineTo(-20,55); ctx.lineTo(-22,-20);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#993300';
  ctx.beginPath(); ctx.ellipse(0,-35,12,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#cc6633';
  ctx.beginPath(); ctx.ellipse(0,-35,8,14,0,0,Math.PI*2); ctx.fill();

  // Gun turrets
  [-18,0,18].forEach(gx => {
    ctx.fillStyle = '#555';
    ctx.fillRect(gx-3,42,6,16);
    ctx.beginPath(); ctx.arc(gx,42,5,Math.PI,0); ctx.fill();
  });

  // HP bar
  const bw = 180, bh = 9;
  ctx.fillStyle = '#222'; ctx.fillRect(-bw/2,-82,bw,bh);
  const frac = hp/maxHp;
  ctx.fillStyle = frac > 0.5 ? '#00ee00' : frac > 0.25 ? '#ffaa00' : '#ff2200';
  ctx.fillRect(-bw/2,-82,bw*frac,bh);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
  ctx.strokeRect(-bw/2,-82,bw,bh);

  ctx.restore();
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
function firePB(x, y, shotType) {
  SFX.shoot();
  if      (shotType === 'single') { playerBullets.push({x, y, vx:0,   vy:-11}); }
  else if (shotType === 'double') { playerBullets.push({x:x-13,y,vx:0,vy:-11},{x:x+13,y,vx:0,vy:-11}); }
  else if (shotType === 'spread') { playerBullets.push({x,y,vx:0,vy:-11},{x,y,vx:-2.5,vy:-10.5},{x,y,vx:2.5,vy:-10.5}); }
}

function drawBullets() {
  ctx.shadowBlur = 8; ctx.shadowColor = '#ffff00';
  ctx.fillStyle = '#ffff88';
  playerBullets.forEach(b => { ctx.fillRect(b.x-2,b.y-6,4,12); });
  ctx.shadowColor = '#ff2200';
  ctx.fillStyle = '#ff5544';
  enemyBullets.forEach(b => {
    ctx.beginPath(); ctx.arc(b.x, b.y, 4.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const P = {
  x:0, y:0, w:36, h:44,
  sp:5, shootCD:0, shotType:'single', shotTimer:0,
  inv:0, rolling:false, rollDir:0, rollAngle:0, rollCD:0,

  reset() {
    this.x = W/2; this.y = H-80;
    this.shotType = 'single'; this.shotTimer = 0;
    this.inv = 200; this.rolling = false;
    this.rollAngle = 0; this.rollCD = 0;
  },

  update() {
    const mv = this.rolling ? 0 : 1;
    if (keys['ArrowLeft']||keys['KeyA']) this.x -= this.sp*mv;
    if (keys['ArrowRight']||keys['KeyD']) this.x += this.sp*mv;
    if (keys['ArrowUp']||keys['KeyW'])   this.y -= this.sp*mv;
    if (keys['ArrowDown']||keys['KeyS']) this.y += this.sp*mv;
    this.x = Math.max(this.w/2, Math.min(W-this.w/2, this.x));
    this.y = Math.max(this.h/2, Math.min(H-this.h/2, this.y));

    // Barrel roll
    if (!this.rolling && this.rollCD <= 0) {
      if (jp['KeyZ']||jp['ShiftLeft'])  { this.rolling=true; this.rollDir=-1; this.rollAngle=0; }
      if (jp['KeyX']||jp['ShiftRight']) { this.rolling=true; this.rollDir= 1; this.rollAngle=0; }
    }
    if (this.rolling) {
      this.rollAngle += 0.18;
      this.x += this.rollDir * 6;
      this.x = Math.max(this.w/2, Math.min(W-this.w/2, this.x));
      this.inv = Math.max(this.inv, 1);
      if (this.rollAngle >= Math.PI*2) {
        this.rolling=false; this.rollAngle=0; this.rollCD=70;
      }
    }
    if (this.rollCD > 0) this.rollCD--;

    // Shoot
    if (this.shootCD > 0) this.shootCD--;
    if ((keys['Space']) && !this.rolling && this.shootCD <= 0) {
      firePB(this.x, this.y-this.h/2, this.shotType);
      this.shootCD = 13;
    }

    // Powerup timer
    if (this.shotTimer > 0) { this.shotTimer--; if (!this.shotTimer) this.shotType='single'; }
    if (this.inv > 0) this.inv--;
  },

  draw() {
    if (this.inv > 0 && Math.floor(this.inv/5)%2===0) ctx.globalAlpha = 0.35;
    drawPlayer(this.x, this.y, this.rolling ? this.rollAngle : 0);
    ctx.globalAlpha = 1;
  },

  hit() {
    if (this.inv > 0) return false;
    return true;
  }
};

// ─── ENEMY CLASS ─────────────────────────────────────────────────────────────
class Enemy {
  constructor(x, y, type, path) {
    this.x = x; this.y = y;
    this.type = type;
    this.path = path || null; this.pathT = 0;
    this.vx = 0; this.vy = type==='bomber' ? 1 : 2;
    this.w  = type==='bomber' ? 80 : 46;
    this.h  = type==='bomber' ? 60 : 40;
    this.hp = type==='bomber' ? 4 : type==='kamikaze' ? 1 : 2;
    this.maxHp = this.hp;
    this.dead = false;
    this.shootCD = 60 + Math.random()*100;
    this.pts = type==='bomber' ? 300 : type==='kamikaze' ? 100 : 150;
    this.col = type==='bomber' ? '#336633' : type==='kamikaze' ? '#bb0000' : '#aa3300';
  }

  update() {
    if (this.path) {
      this.pathT = Math.min(1, this.pathT + 0.012);
      const [p0,p1,p2,p3] = this.path, t = this.pathT, m = 1-t;
      this.x = m*m*m*p0.x + 3*m*m*t*p1.x + 3*m*t*t*p2.x + t*t*t*p3.x;
      this.y = m*m*m*p0.y + 3*m*m*t*p1.y + 3*m*t*t*p2.y + t*t*t*p3.y;
      if (this.pathT >= 1) this.path = null;
    } else {
      if (this.type==='kamikaze') {
        const dx=P.x-this.x, dy=P.y-this.y, d=Math.hypot(dx,dy)||1;
        this.vx += dx/d*0.25; this.vy += dy/d*0.12;
        const sp=Math.hypot(this.vx,this.vy);
        if(sp>5){this.vx=this.vx/sp*5;this.vy=this.vy/sp*5;}
      } else {
        this.vy = this.type==='bomber' ? 1 : 1.8;
      }
      this.x += this.vx; this.y += this.vy;
    }

    if (this.type !== 'kamikaze') {
      this.shootCD--;
      if (this.shootCD <= 0) {
        this.shootCD = 70 + Math.random()*80;
        const dx=P.x-this.x, dy=P.y-this.y, d=Math.hypot(dx,dy)||1;
        const spd = 4;
        enemyBullets.push({ x:this.x, y:this.y+this.h/2, vx:dx/d*spd, vy:dy/d*spd });
        SFX.enemyShoot();
      }
    }

    if (this.y > H+80 || this.x < -120 || this.x > W+120) this.dead = true;
  }

  hit(dmg=1) {
    this.hp -= dmg;
    SFX.hit();
    explode(this.x, this.y, 6);
    if (this.hp <= 0) {
      this.dead = true;
      explode(this.x, this.y, this.type==='bomber' ? 28 : 14, this.type==='bomber');
      SFX.boom();
      score += this.pts;
      if (Math.random()<0.15) spawnPU(this.x, this.y);
    }
  }

  draw() {
    if (this.type==='bomber') drawBomber(this.x, this.y);
    else drawFighter(this.x, this.y, this.col);
  }
}

// ─── BOSS CLASS ───────────────────────────────────────────────────────────────
class Boss {
  constructor() {
    this.x = W/2; this.y = -80;
    this.w = 180; this.h = 130;
    this.hp = 80 + level*60; this.maxHp = this.hp;
    this.vx = 1.8; this.phase = 0; this.timer = 0;
    this.shootCD = 45; this.entering = true; this.dead = false;
  }

  update() {
    this.timer++;
    if (this.entering) { this.y += 2.5; if (this.y >= 130) this.entering=false; return; }

    this.x += this.vx;
    if (this.x > W-this.w/2 || this.x < this.w/2) this.vx *= -1;

    if (this.hp < this.maxHp*0.5) this.phase = 1;
    if (this.hp < this.maxHp*0.25) this.phase = 2;

    this.shootCD--;
    if (this.shootCD <= 0) {
      const rate = [45,28,18][this.phase];
      this.shootCD = rate;
      if (this.phase === 0) {
        this._aim(P.x, P.y, 4);
      } else if (this.phase === 1) {
        for (let a=-35; a<=35; a+=17) {
          const r=(a+90)*Math.PI/180;
          enemyBullets.push({x:this.x,y:this.y+this.h/2,vx:Math.cos(r)*3.5,vy:Math.sin(r)*3.5});
        }
        SFX.enemyShoot();
      } else {
        for (let a=0;a<360;a+=24){
          const r=a*Math.PI/180;
          enemyBullets.push({x:this.x,y:this.y,vx:Math.cos(r)*3.2,vy:Math.sin(r)*3.2});
        }
        SFX.enemyShoot();
      }
    }

    if (this.timer % 130 === 0) {
      enemies.push(new Enemy(20+Math.random()*(W-40), -25, 'fighter'));
    }
  }

  _aim(tx,ty,spd) {
    const dx=tx-this.x, dy=ty-this.y, d=Math.hypot(dx,dy)||1;
    enemyBullets.push({x:this.x,y:this.y+this.h/2,vx:dx/d*spd,vy:dy/d*spd});
    SFX.enemyShoot();
  }

  hit(dmg=1) {
    this.hp -= dmg;
    SFX.hit();
    explode(this.x+(Math.random()-.5)*70, this.y+(Math.random()-.5)*50, 8);
    score += 8;
    if (this.hp <= 0) {
      this.dead = true;
      for(let i=0;i<8;i++) setTimeout(()=>explode(this.x+(Math.random()-.5)*120,this.y+(Math.random()-.5)*80,30,true),i*160);
      SFX.bigBoom();
      score += 5000 + level*1000;
    }
  }

  draw() { drawBossPlane(this.x, this.y, this.hp, this.maxHp); }
}

// ─── POWER-UPS ───────────────────────────────────────────────────────────────
function spawnPU(x,y) {
  const types=['double','spread','shield','life'];
  powerups.push({x,y,type:types[Math.floor(Math.random()*types.length)],vy:2,ttl:360,w:22,h:22});
}

function tickPowerups() {
  powerups = powerups.filter(p => {
    p.y += p.vy; p.ttl--;
    if (Math.abs(p.x-P.x)<24 && Math.abs(p.y-P.y)<24) {
      applyPU(p.type); return false;
    }
    return p.ttl>0 && p.y<H+30;
  });
}

function applyPU(type) {
  SFX.powerup();
  if      (type==='double') { P.shotType='double'; P.shotTimer=600; }
  else if (type==='spread') { P.shotType='spread'; P.shotTimer=600; }
  else if (type==='shield') { P.inv=300; }
  else if (type==='life')   { lives=Math.min(5,lives+1); }
}

const PU_COLS = {double:'#ffee00',spread:'#00eeff',shield:'#00ff88',life:'#ff55ff'};
const PU_LABELS = {double:'2X',spread:'SPR',shield:'SHD',life:'+1'};
function drawPowerups() {
  powerups.forEach(p => {
    if (p.ttl<120 && Math.floor(p.ttl/8)%2===0) return;
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.fillStyle = PU_COLS[p.type]; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*72-90)*Math.PI/180, a2=((i+.5)*72-90)*Math.PI/180;
      i===0?ctx.moveTo(Math.cos(a)*13,Math.sin(a)*13):ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
      ctx.lineTo(Math.cos(a2)*5,Math.sin(a2)*5);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 7px Courier New'; ctx.textAlign='center';
    ctx.fillText(PU_LABELS[p.type],0,3);
    ctx.restore();
  });
}

// ─── WAVE SYSTEM ─────────────────────────────────────────────────────────────
function curvePath(x1,y1, x2,y2, cx1,cy1, cx2,cy2) {
  return [{x:x1,y:y1},{x:cx1,y:cy1},{x:cx2,y:cy2},{x:x2,y:y2}];
}

function spawnWave() {
  waveNum++;
  waveSpawned = false;

  if (waveNum % 8 === 0) {
    bossObj = new Boss();
    waveSpawned = true;
    return;
  }

  const n = Math.min(4 + Math.floor(waveNum/2), 10);
  let delay = 0;

  // Bomber group every 4 waves
  if (waveNum % 4 === 0) {
    for (let i=0; i<3; i++) {
      const bx = 80+i*120;
      setTimeout(()=> enemies.push(new Enemy(bx,-50,'bomber',curvePath(bx,-50,bx,H/3+50,bx-40,80,bx+40,160))), i*900);
      delay = Math.max(delay, i*900+1500);
    }
  }

  // Fighter formation
  for (let i=0; i<n; i++) {
    const left = Math.random()<0.5;
    const sx = left ? -30 : W+30;
    const tx = 60+Math.random()*(W-120);
    const ty = 80+Math.random()*200;
    const mx = left ? sx+100 : sx-100;
    const path = curvePath(sx,-30,tx,ty,mx,30,tx+(left?40:-40),ty-60);
    const type = Math.random()<0.18 ? 'kamikaze' : 'fighter';
    setTimeout(()=> enemies.push(new Enemy(sx,-30,type,path)), i*420 + delay);
  }
  const total = n*420 + delay + 1800;
  setTimeout(()=>{ waveSpawned=true; }, total);
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function hit(ax,ay,aw,ah,bx,by,bw,bh) {
  return Math.abs(ax-bx)<(aw+bw)/2 && Math.abs(ay-by)<(ah+bh)/2;
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.font='bold 15px "Courier New"';
  ctx.fillText(`SCORE: ${String(score).padStart(8,'0')}`, 8, 22);
  ctx.textAlign='right';
  ctx.fillText(`HI: ${String(hiScore).padStart(8,'0')}`, W-8, 22);
  ctx.textAlign='center'; ctx.font='bold 12px "Courier New"';
  ctx.fillStyle='#aac';
  ctx.fillText(`LEVEL ${level}  WAVE ${waveNum}`, W/2, 22);

  // Lives
  for(let i=0;i<lives;i++){
    ctx.save(); ctx.translate(10+i*26, H-18); ctx.scale(0.4,0.4);
    drawPlayer(0,0,0); ctx.restore();
  }

  // Boss warning
  if (bossObj && !bossObj.dead) {
    if (Math.floor(frame/20)%2===0) {
      ctx.fillStyle='#ff3300'; ctx.font='bold 13px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('⚠  BOSS  ⚠', W/2, H-14);
    }
  }

  // Power-up timer
  if (P.shotType!=='single') {
    ctx.fillStyle='#ffee00'; ctx.font='11px "Courier New"'; ctx.textAlign='right';
    ctx.fillText(`PWR: ${P.shotType.toUpperCase()} ${Math.ceil(P.shotTimer/60)}s`, W-8, H-14);
  }

  // Roll cooldown
  if (P.rollCD>0) {
    ctx.fillStyle=`rgba(255,220,0,${P.rollCD/70})`; ctx.font='10px "Courier New"'; ctx.textAlign='left';
    ctx.fillText(`ROLL ${Math.ceil(P.rollCD/60)}s`, 8, H-14);
  }
}

function drawOverlay(title, titleCol, lines, blink) {
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowBlur=18; ctx.shadowColor=titleCol;
  ctx.fillStyle=titleCol; ctx.font=`bold 56px "Courier New"`;
  ctx.fillText(title, W/2, H/2-80);
  ctx.shadowBlur=0;
  ctx.fillStyle='#ddd'; ctx.font='14px "Courier New"';
  lines.forEach((l,i)=>ctx.fillText(l, W/2, H/2-30+i*26));
  if (Math.floor(frame/28)%2===0) {
    ctx.fillStyle='#ffee00'; ctx.font='bold 13px "Courier New"';
    ctx.fillText(blink, W/2, H/2+120);
  }
}

// ─── GAME FLOW ────────────────────────────────────────────────────────────────
function startGame() {
  score=0; lives=3; level=1; frame=0;
  waveNum=0; waveTimer=0; waveSpawned=false;
  playerBullets=[]; enemyBullets=[]; enemies=[];
  powerups=[]; particles=[];
  bossObj=null;
  genIslands();
  P.reset();
  STATE='playing';
  spawnWave();
}

function killPlayer() {
  if (!P.hit()) return;
  explode(P.x,P.y,42,true); SFX.death();
  playerBullets=[]; lives--;
  if (lives<=0) {
    STATE='gameover';
    if(score>hiScore){ hiScore=score; localStorage.setItem('1942hi',hiScore); }
  } else {
    P.reset();
  }
}

// ─── MAIN UPDATE ─────────────────────────────────────────────────────────────
function update() {
  frame++;
  if (STATE !== 'playing') return;

  bgY = (bgY+1.2) % (H*4);

  // Wave logic
  waveTimer++;
  if (waveSpawned && enemies.length===0 && !bossObj && waveTimer>200) {
    waveTimer=0; spawnWave();
  }

  P.update();

  // Player bullets
  playerBullets = playerBullets.filter(b => {
    b.x+=b.vx; b.y+=b.vy;
    return b.y>-20 && b.x>-10 && b.x<W+10;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x+=b.vx; b.y+=b.vy;
    if (P.inv<=0 && hit(b.x,b.y,8,8,P.x,P.y,P.w*.55,P.h*.55)) { killPlayer(); return false; }
    return b.y<H+20 && b.y>-20 && b.x>-20 && b.x<W+20;
  });

  // Update enemies
  enemies.forEach(e=>e.update());

  // Player bullets vs enemies / boss
  playerBullets = playerBullets.filter(pb => {
    let killed=false;
    for(const e of enemies){
      if(!e.dead && hit(pb.x,pb.y,4,12,e.x,e.y,e.w*.75,e.h*.75)){
        e.hit(); killed=true; break;
      }
    }
    if(!killed && bossObj && !bossObj.dead && hit(pb.x,pb.y,4,12,bossObj.x,bossObj.y,bossObj.w,bossObj.h)){
      bossObj.hit(); killed=true;
    }
    return !killed;
  });

  // Enemy body vs player
  enemies.forEach(e=>{
    if(!e.dead && hit(e.x,e.y,e.w*.65,e.h*.65,P.x,P.y,P.w*.55,P.h*.55)){
      e.hit(99); killPlayer();
    }
  });

  enemies = enemies.filter(e=>!e.dead);

  // Boss
  if(bossObj){
    bossObj.update();
    if(bossObj.dead){ bossObj=null; level++; SFX.levelUp(); }
  }

  tickPowerups();
  tickParticles();
  clearJP();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  drawBG();

  if(STATE==='menu'){
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowBlur=24; ctx.shadowColor='#ff4400';
    ctx.fillStyle='#ff4400'; ctx.font='bold 68px "Courier New"';
    ctx.fillText('1942', W/2, 145);
    ctx.shadowColor='#ff8800'; ctx.fillStyle='#ff8800'; ctx.font='bold 16px "Courier New"';
    ctx.fillText('PACIFIC ACE', W/2, 180);
    ctx.shadowBlur=0;
    ctx.fillStyle='#8899bb'; ctx.font='13px "Courier New"';
    const ctrls=['ARROWS / WASD  –  Move','SPACE  –  Fire','Z / SHIFT-L  –  Barrel Roll Left','X / SHIFT-R  –  Barrel Roll Right','ESC  –  Pause'];
    ctrls.forEach((c,i)=>ctx.fillText(c, W/2, 240+i*23));
    if(Math.floor(frame/28)%2===0){
      ctx.fillStyle='#ffee00'; ctx.font='bold 15px "Courier New"';
      ctx.fillText('PRESS SPACE TO START', W/2, H-55);
    }
    ctx.fillStyle='#556'; ctx.font='11px "Courier New"';
    ctx.fillText(`BEST: ${String(hiScore).padStart(8,'0')}`, W/2, H-25);
    return;
  }

  drawBullets();
  drawParticles();
  drawPowerups();
  enemies.forEach(e=>e.draw());
  if(bossObj && !bossObj.dead) bossObj.draw();
  P.draw();
  drawHUD();

  if(STATE==='gameover'){
    drawOverlay('GAME OVER','#ff2200',
      [`SCORE: ${String(score).padStart(8,'0')}`,
       score>=hiScore ? '✦ NEW HIGH SCORE ✦' : `BEST:  ${String(hiScore).padStart(8,'0')}`],
      'PRESS SPACE TO RETRY');
  }
  if(STATE==='paused'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.fillStyle='#fff';
    ctx.font='bold 36px "Courier New"'; ctx.fillText('PAUSED', W/2, H/2);
    ctx.font='13px "Courier New"'; ctx.fillText('ESC – resume', W/2, H/2+44);
  }
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }
genIslands();
loop();
</script>
